<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love! ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffe6e6; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        
        /* Screen 1: Welcome Animation */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; transition: opacity 1s ease; }
        .heart { font-size: 80px; animation: beat 0.6s infinite alternate; cursor: pointer; user-select: none; -webkit-user-select: none; }
        @keyframes beat { to { transform: scale(1.3); } }
        .welcome-text { margin-top: 20px; font-size: 22px; color: #ff4d6d; font-weight: bold; text-align: center; padding: 0 20px; }

        /* Screen 2: Scratch Card Screen */
        #scratch-screen { display: none; opacity: 0; transition: opacity 1s ease; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: center; }
        .container { position: relative; width: 320px; height: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; background: #fff; }
        
        /* The Secret Photo (Underneath) */
        #secret-photo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* The Blank Canvas (On Top) */
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: pointer; }
        
        .instruction { margin-top: 20px; font-size: 18px; color: #ff4d6d; font-weight: bold; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen" onclick="startSurprise()">
        <div class="heart">❤️</div>
        <div class="welcome-text">Click the Heart to Open Your Surprise! ✨</div>
    </div>

    <div id="scratch-screen">
        <div class="container">
            <img id="secret-photo" src="photo.jpg" alt="Surprise Photo">
            <canvas id="scratch-canvas" width="320" height="400"></canvas>
        </div>
        <div class="instruction">👇 Erase Here with Your Finger! 👇</div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        
        // Force preload audio file
        window.addEventListener('DOMContentLoaded', () => {
            audio.load();
        });

        function startSurprise() {
            // Unmute and force play immediately on click
            audio.muted = false;
            var playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Local MP3 audio playing perfectly!");
                }).catch(error => {
                    console.log("Playback blocked, trying backup trigger...", error);
                    // Mobile user touch fallback
                    document.body.addEventListener('touchstart', function() {
                        audio.play();
                    }, {once: true});
                });
            }
            
            // Party Pop Effect (Confetti)
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            // Transition to Scratch Card
            setTimeout(() => {
                const welcome = document.getElementById('welcome-screen');
                const scratchScreen = document.getElementById('scratch-screen');
                
                welcome.style.opacity = '0';
                setTimeout(() => {
                    welcome.style.display = 'none';
                    scratchScreen.style.display = 'flex';
                    setTimeout(() => { scratchScreen.style.opacity = '1'; }, 50);
                    initScratchCard();
                }, 1000);
            }, 2500);
        }

        function initScratchCard() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            ctx.fillStyle = '#ffb3c1'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold 22px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText('ERASE HERE! ✨', canvas.width / 2, canvas.height / 2);

            function scratch(x, y) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 28, 0, Math.PI * 2);
                ctx.fill();
            }

            canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e.offsetX, e.offsetY); });
            canvas.addEventListener('mousemove', (e) => { if (isDrawing) scratch(e.offsetX, e.offsetY); });
            window.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                scratch(touch.clientX - rect.left, touch.clientY - rect.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                scratch(touch.clientX - rect.left, touch.clientY - rect.top);
            });
            window.addEventListener('touchend', () => isDrawing = false);
        }
    </script>
</body>
</html>
